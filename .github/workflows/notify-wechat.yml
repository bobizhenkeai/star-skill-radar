name: 微信更新推送

on:
  push:
    branches: [master]
    paths:
      - "reports/**"

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: 发送 Server酱 通知
        env:
          SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          SITE_URL: https://bobizhenkeai.github.io/star-skill-radar/site/
        run: |
          if [ -z "$SENDKEY" ]; then
            echo "未配置 SERVERCHAN_SENDKEY secret，跳过微信推送。"
            exit 0
          fi
          TODAY=$(TZ=Asia/Shanghai date +%F)
          TITLE="Star-Skill Radar 情报更新（${TODAY}）"
          DESP=$(printf '今日 AI 技术资产情报已生成。\n\n[打开情报站](%s)\n\n[查看 Markdown 报告](https://github.com/%s/blob/master/reports/%s.md)' "$SITE_URL" "$GITHUB_REPOSITORY" "$TODAY")
          curl -sS -X POST "https://sctapi.ftqq.com/${SENDKEY}.send" \
            --data-urlencode "title=${TITLE}" \
            --data-urlencode "desp=${DESP}"
